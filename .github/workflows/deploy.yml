name: test-and-deploy

# Deploys run from mvp-foundation: it is the repo's default branch and the
# only branch the auto-created github-pages environment allows. If the default
# branch ever flips to main, add main to the environment's allowed branches
# (Settings -> Environments -> github-pages) and switch DEPLOY_REF below.
on:
  push:
    branches: [main, mvp-foundation]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/mvp-foundation'
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/mvp-foundation'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
